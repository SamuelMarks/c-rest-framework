name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    uses: SamuelMarks/c-ci/.github/workflows/c-cmake-ci.yml@master

  wasm_build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup emsdk
      uses: mymindstorm/setup-emsdk@v14
      with:
        version: latest

    - name: Configure CMake
      run: emcmake cmake -B build-wasm -DCMAKE_BUILD_TYPE=Release -DCMAKE_DISABLE_FIND_PACKAGE_OpenSSL=ON -DCMAKE_DISABLE_FIND_PACKAGE_CURL=ON

    - name: Build
      run: cmake --build build-wasm

    - name: Test
      run: node build-wasm/bin/c-rest-framework-tests.js
